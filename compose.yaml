name: local-postgres

services:
  postgres:
    image: postgres:17
    container_name: local-postgres
    restart: unless-stopped
    ports:
      - "0.0.0.0:5432:5432"
    environment:
      POSTGRES_DB: localdb
      POSTGRES_USER: app
      POSTGRES_PASSWORD: adsl@1234
    volumes:
      - pg_data:/var/lib/postgresql/data

  db-init:
    image: postgres:17
    depends_on:
      - postgres
    environment:
      PGPASSWORD: adsl@1234
    volumes:
      - ./local-postgres-tools/schema.sql:/init/001_notes.sql:ro
      - ./migrations/001_create_agent_test_items.sql:/init/002_agent_test_items.sql:ro
      - ./migrations/002_create_ai_news_items.sql:/init/003_ai_news_items.sql:ro
      - ./migrations/003_create_experience_lessons.sql:/init/004_experience_lessons.sql:ro
      - ./migrations/004_seed_experience_lesson_hvigor_preview_port.sql:/init/005_seed_experience_lesson_hvigor_preview_port.sql:ro
      - ./migrations/005_add_notes_source.sql:/init/006_add_notes_source.sql:ro
      - ./migrations/006_create_ai_coding_oss_top5_items.sql:/init/007_create_ai_coding_oss_top5_items.sql:ro
      - ./migrations/007_seed_ai_coding_oss_top5_recent_week.sql:/init/008_seed_ai_coding_oss_top5_recent_week.sql:ro
      - ./migrations/015_create_ai_coding_oss_manual_projects.sql:/init/009_ai_coding_oss_manual_projects.sql:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until pg_isready -h postgres -p 5432 -U app -d localdb; do
          sleep 1
        done
        psql -h postgres -U app -d localdb -v ON_ERROR_STOP=1 -f /init/001_notes.sql
        psql -h postgres -U app -d localdb -v ON_ERROR_STOP=1 -f /init/002_agent_test_items.sql
        psql -h postgres -U app -d localdb -v ON_ERROR_STOP=1 -f /init/003_ai_news_items.sql
        psql -h postgres -U app -d localdb -v ON_ERROR_STOP=1 -f /init/004_experience_lessons.sql
        psql -h postgres -U app -d localdb -v ON_ERROR_STOP=1 -f /init/005_seed_experience_lesson_hvigor_preview_port.sql
        psql -h postgres -U app -d localdb -v ON_ERROR_STOP=1 -f /init/006_add_notes_source.sql
        psql -h postgres -U app -d localdb -v ON_ERROR_STOP=1 -f /init/007_create_ai_coding_oss_top5_items.sql
        psql -h postgres -U app -d localdb -v ON_ERROR_STOP=1 -f /init/008_seed_ai_coding_oss_top5_recent_week.sql
        psql -h postgres -U app -d localdb -v ON_ERROR_STOP=1 -f /init/009_ai_coding_oss_manual_projects.sql

  db-tools:
    image: postgres:17
    profiles:
      - tools
    depends_on:
      - postgres
    environment:
      PGPASSWORD: adsl@1234
    volumes:
      - ./local-postgres-tools/schema.sql:/init/001_notes.sql:ro
      - ./migrations:/migrations:ro
    entrypoint:
      - psql
      - -h
      - postgres
      - -U
      - app
      - -d
      - localdb
      - -v
      - ON_ERROR_STOP=1

  dashboard-api:
    build: ./backend
    container_name: local-postgres-dashboard-api
    restart: unless-stopped
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://app:adsl%401234@postgres:5432/localdb
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}

  dashboard-web:
    build: ./frontend
    container_name: local-postgres-dashboard-web
    restart: unless-stopped
    depends_on:
      - dashboard-api
    ports:
      - "0.0.0.0:15173:5173"

volumes:
  pg_data:
