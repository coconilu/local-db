name: local-postgres

services:
  postgres:
    image: postgres:17
    container_name: local-postgres
    restart: unless-stopped
    ports:
      - "${LOCAL_DB_BIND_ADDRESS:-127.0.0.1}:${LOCAL_DB_POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: localdb
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${LOCAL_DB_ADMIN_PASSWORD:?Copy .env.example to .env and set LOCAL_DB_ADMIN_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data

  db-init:
    image: postgres:17
    depends_on:
      - postgres
    environment:
      PGPASSWORD: ${LOCAL_DB_ADMIN_PASSWORD:?Copy .env.example to .env and set LOCAL_DB_ADMIN_PASSWORD}
      DASHBOARD_DB_PASSWORD: ${LOCAL_DB_DASHBOARD_PASSWORD:?Copy .env.example to .env and set LOCAL_DB_DASHBOARD_PASSWORD}
    volumes:
      - ./local-postgres-tools/schema.sql:/init/001_notes.sql:ro
      - ./migrations/001_create_agent_test_items.sql:/init/002_agent_test_items.sql:ro
      - ./migrations/002_create_ai_news_items.sql:/init/003_ai_news_items.sql:ro
      - ./migrations/003_create_experience_lessons.sql:/init/004_experience_lessons.sql:ro
      - ./migrations/005_add_notes_source.sql:/init/006_add_notes_source.sql:ro
      - ./migrations/006_create_ai_coding_oss_top5_items.sql:/init/007_create_ai_coding_oss_top5_items.sql:ro
      - ./migrations/008_create_ai_coding_oss_manual_projects.sql:/init/008_ai_coding_oss_manual_projects.sql:ro
      - ./migrations/009_create_dashboard_user.sql:/init/009_create_dashboard_user.sql:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until pg_isready -h postgres -p 5432 -U app -d localdb; do
          sleep 1
        done
        psql -h postgres -U app -d localdb -v ON_ERROR_STOP=1 -f /init/001_notes.sql
        psql -h postgres -U app -d localdb -v ON_ERROR_STOP=1 -f /init/002_agent_test_items.sql
        psql -h postgres -U app -d localdb -v ON_ERROR_STOP=1 -f /init/003_ai_news_items.sql
        psql -h postgres -U app -d localdb -v ON_ERROR_STOP=1 -f /init/004_experience_lessons.sql
        psql -h postgres -U app -d localdb -v ON_ERROR_STOP=1 -f /init/006_add_notes_source.sql
        psql -h postgres -U app -d localdb -v ON_ERROR_STOP=1 -f /init/007_create_ai_coding_oss_top5_items.sql
        psql -h postgres -U app -d localdb -v ON_ERROR_STOP=1 -f /init/008_ai_coding_oss_manual_projects.sql
        psql -h postgres -U app -d localdb -v ON_ERROR_STOP=1 -v dashboard_db_password="$$DASHBOARD_DB_PASSWORD" -f /init/009_create_dashboard_user.sql

  db-tools:
    image: postgres:17
    profiles:
      - tools
    depends_on:
      - postgres
    environment:
      PGPASSWORD: ${LOCAL_DB_ADMIN_PASSWORD:?Copy .env.example to .env and set LOCAL_DB_ADMIN_PASSWORD}
    volumes:
      - ./local-postgres-tools/schema.sql:/init/001_notes.sql:ro
      - ./migrations:/migrations:ro
      - ./local-data:/local-data:ro
    entrypoint:
      - psql
      - -h
      - postgres
      - -U
      - app
      - -d
      - localdb
      - -v
      - ON_ERROR_STOP=1

  dashboard-api:
    build: ./backend
    container_name: local-postgres-dashboard-api
    restart: unless-stopped
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: localdb
      DATABASE_USER: dashboard_user
      DATABASE_PASSWORD: ${LOCAL_DB_DASHBOARD_PASSWORD:?Copy .env.example to .env and set LOCAL_DB_DASHBOARD_PASSWORD}
      REQUIRE_DASHBOARD_AUTH: ${REQUIRE_DASHBOARD_AUTH:-false}
      DASHBOARD_ACCESS_TOKEN: ${DASHBOARD_ACCESS_TOKEN:-}
      DASHBOARD_ALLOWED_ORIGINS: ${DASHBOARD_ALLOWED_ORIGINS:-http://127.0.0.1:15173,http://localhost:15173}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}

  dashboard-web:
    build: ./frontend
    container_name: local-postgres-dashboard-web
    restart: unless-stopped
    depends_on:
      - dashboard-api
    ports:
      - "${LOCAL_DB_BIND_ADDRESS:-127.0.0.1}:${LOCAL_DB_DASHBOARD_PORT:-15173}:5173"

volumes:
  pg_data:
